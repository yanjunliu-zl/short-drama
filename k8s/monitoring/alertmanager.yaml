# AlertManager configuration for production alerting
# Integrates with PagerDuty (critical) and Slack (warnings)
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: shortdrama
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m
      slack_api_url: 'https://hooks.slack.com/services/CHANGE_ME'

    route:
      group_by: ['alertname', 'severity', 'service']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      receiver: 'slack-warnings'
      routes:
        - match:
            severity: critical
          receiver: 'pagerduty-critical'
          continue: true
        - match:
            severity: warning
          receiver: 'slack-warnings'
        - match:
            alertname: ServiceDown
          receiver: 'pagerduty-critical'
          group_wait: 10s
          repeat_interval: 5m

    receivers:
      - name: 'pagerduty-critical'
        pagerduty_configs:
          - routing_key: 'CHANGE_ME_PAGERDUTY_KEY'
            severity: critical
            description: '{{ .CommonAnnotations.summary }}'
            details:
              firing: '{{ .Alerts.Firing | len }}'
              resolved: '{{ .Alerts.Resolved | len }}'

      - name: 'slack-warnings'
        slack_configs:
          - channel: '#shortdrama-alerts'
            title: '{{ .GroupLabels.alertname }} - {{ .Status | toUpper }}'
            text: |
              *Severity:* {{ .CommonLabels.severity }}
              *Service:* {{ .CommonLabels.service }}
              *Summary:* {{ .CommonAnnotations.summary }}
              *Description:* {{ .CommonAnnotations.description }}
              {{ range .Alerts }}
              - {{ .Annotations.message }}
              {{ end }}

    inhibit_rules:
      - source_match:
          severity: 'critical'
        target_match:
          severity: 'warning'
        equal: ['alertname', 'service']
