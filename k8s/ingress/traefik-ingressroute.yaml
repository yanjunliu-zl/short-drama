apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: shortdrama-api
  namespace: shortdrama
spec:
  entryPoints:
    - web
  routes:
    - match: PathPrefix(`/api/v1/users`)
      kind: Rule
      services:
        - name: user-service
          port: 8080
      middlewares:
        - name: rate-limit
        - name: retry
    - match: PathPrefix(`/api/v1/scripts`)
      kind: Rule
      services:
        - name: script-service
          port: 8000
      middlewares:
        - name: rate-limit
        - name: retry
    - match: PathPrefix(`/api/v1/storyboard`)
      kind: Rule
      services:
        - name: storyboard-service
          port: 8001
      middlewares:
        - name: rate-limit
        - name: retry
    - match: PathPrefix(`/api/v1/cases`) || PathPrefix(`/api/v1/works`) || PathPrefix(`/api/v1/scenes`) || PathPrefix(`/api/v1/characters`)
      kind: Rule
      services:
        - name: content-service
          port: 8081
      middlewares:
        - name: rate-limit
        - name: retry
    - match: PathPrefix(`/api/v1/llmhua`)
      kind: Rule
      services:
        - name: llmhua-service
          port: 8002
      middlewares:
        - name: rate-limit
        - name: retry
    - match: PathPrefix(`/api/v1/videos`)
      kind: Rule
      services:
        - name: video-service
          port: 8000
      middlewares:
        - name: rate-limit
        - name: retry
    - match: PathPrefix(`/api/v1/final-cut`)
      kind: Rule
      services:
        - name: final-cut-service
          port: 8085
      middlewares:
        - name: rate-limit
        - name: retry
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: rate-limit
  namespace: shortdrama
spec:
  rateLimit:
    average: 100
    burst: 50
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: retry
  namespace: shortdrama
spec:
  retry:
    attempts: 3
    initialInterval: 500ms
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: circuit-breaker
  namespace: shortdrama
spec:
  circuitBreaker:
    expression: "NetworkErrorRatio() > 0.5"
