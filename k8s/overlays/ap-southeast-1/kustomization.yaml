# Multi-region overlay: Asia Pacific Southeast (Singapore)
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: shortdrama

resources:
  - ../../base
  - ../../infra
  - ../../services
  - ../../ingress
  - ../../monitoring

patches:
  - target:
      kind: ConfigMap
      name: shortdrama-config
    patch: |-
      - op: replace
        path: /data/REGION
        value: "ap-southeast-1"
      - op: replace
        path: /data/STORAGE_PUBLIC_ENDPOINT
        value: "https://s3.ap-southeast-1.amazonaws.com"
      - op: replace
        path: /data/STORAGE_REGION
        value: "ap-southeast-1"
      - op: replace
        path: /data/APP_ENV
        value: "production-sg"
      - op: replace
        path: /data/SEEDANCE_API_URL
        value: "https://ark.ap-southeast-1.volces.com/api/v3"

images:
  - name: shortdrama/script-service
    newTag: latest-sg
  - name: shortdrama/storyboard-service
    newTag: latest-sg
  - name: shortdrama/content-service
    newTag: latest-sg
  - name: shortdrama/user-service
    newTag: latest-sg
  - name: shortdrama/llmhua-service
    newTag: latest-sg
  - name: shortdrama/video-service
    newTag: latest-sg
  - name: shortdrama/video-worker
    newTag: latest-sg
