# EU West (Ireland) — Europe Region Patches
# GDPR-compliant, read-only TiDB, local object storage
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: script-service
spec:
  replicas: 2
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llmhua-service
spec:
  replicas: 2
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: recommendation-service
spec:
  replicas: 2
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: tidb-config
data:
  TIDB_WRITE_MODE: read-only
  TIDB_CDC_ENABLED: "true"
  TIDB_CDC_SOURCE: us-east-1
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: storage-config
data:
  STORAGE_TYPE: s3
  STORAGE_ENDPOINT: https://s3.eu-west-1.amazonaws.com
  STORAGE_REGION: eu-west-1
  CDN_DOMAIN: https://d3abc789.cloudfront.net
---
# GDPR: Data residency — ensure user data stays in EU
apiVersion: v1
kind: ConfigMap
metadata:
  name: gdpr-config
data:
  DATA_RESIDENCY: eu-only
  LOG_RETENTION_DAYS: "30"
  PII_MASKING: enabled
