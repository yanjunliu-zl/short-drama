# ExternalSecrets — Kubernetes Secret 外部管理 (Vault / AWS Secrets Manager / GCP Secret Manager)
# 替代 .env 明文存储 API Key 和数据库密码
#
# 安装 ExternalSecret Operator:
#   helm repo add external-secrets https://charts.external-secrets.io
#   helm install external-secrets external-secrets/external-secrets -n external-secrets --create-namespace
#
# 支持后端:
#   - HashiCorp Vault (企业自建)
#   - AWS Secrets Manager (AWS部署)
#   - GCP Secret Manager (GCP部署)
#   - Azure Key Vault (Azure部署)
---
# SecretStore — 连接到 Vault/AWS/GCP 后端
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: shortdrama-secrets
  namespace: shortdrama
spec:
  provider:
    # 方案 A: HashiCorp Vault (企业自建, 推荐)
    vault:
      server: "https://vault.internal:8200"
      path: "shortdrama"
      version: v2
      auth:
        kubernetes:
          mountPath: kubernetes
          role: shortdrama
          serviceAccountRef:
            name: shortdrama-sa
    # 方案 B: AWS Secrets Manager (AWS 部署时使用)
    # aws:
    #   service: SecretsManager
    #   region: us-east-1
    #   auth:
    #     jwt:
    #       serviceAccountRef:
    #         name: shortdrama-sa
    # 方案 C: GCP Secret Manager
    # gcpsm:
    #   projectID: shortdrama-prod
    #   auth:
    #     workloadIdentity:
    #       serviceAccountRef:
    #         name: shortdrama-sa

---
# ExternalSecret — 将外部密钥同步到 K8s Secret
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: shortdrama-api-keys
  namespace: shortdrama
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: shortdrama-secrets
    kind: SecretStore
  target:
    name: shortdrama-api-keys
    creationPolicy: Owner
  data:
    - secretKey: DEEPSEEK_API_KEY
      remoteRef:
        key: shortdrama/deepseek
        property: api_key
    - secretKey: SEEDANCE_API_KEY
      remoteRef:
        key: shortdrama/seedance
        property: api_key
    - secretKey: OPENAI_API_KEY
      remoteRef:
        key: shortdrama/openai
        property: api_key
    - secretKey: ANTHROPIC_API_KEY
      remoteRef:
        key: shortdrama/anthropic
        property: api_key

---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: shortdrama-db-credentials
  namespace: shortdrama
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: shortdrama-secrets
    kind: SecretStore
  target:
    name: shortdrama-db-credentials
    creationPolicy: Owner
  data:
    - secretKey: DB_PASSWORD
      remoteRef:
        key: shortdrama/mysql
        property: password
    - secretKey: DB_ROOT_PASSWORD
      remoteRef:
        key: shortdrama/mysql
        property: root_password
    - secretKey: REDIS_PASSWORD
      remoteRef:
        key: shortdrama/redis
        property: password
    - secretKey: JWT_SECRET_KEY
      remoteRef:
        key: shortdrama/jwt
        property: secret

---
# Vault 初始化配置 (手动执行一次)
# vault secrets enable -path=shortdrama kv-v2
# vault write shortdrama/deepseek    api_key="sk-xxx"
# vault write shortdrama/seedance    api_key="ark-xxx"
# vault write shortdrama/openai      api_key="sk-xxx"
# vault write shortdrama/anthropic   api_key="sk-ant-xxx"
# vault write shortdrama/mysql       password="xxx" root_password="xxx"
# vault write shortdrama/redis       password="xxx"
# vault write shortdrama/jwt         secret="xxx"
