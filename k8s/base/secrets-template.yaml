# ============================================================
# 生产环境密钥模版
# ============================================================
# 用法: 复制此文件为 secrets.yaml，填入真实密钥，然后:
#
#   方案 A — kubectl (开发/测试环境):
#     kubectl apply -f base/secrets.yaml
#
#   方案 B — SealedSecrets (生产环境, 推荐):
#     kubeseal --format yaml < base/secrets.yaml > base/secrets-sealed.yaml
#     kubectl apply -f base/secrets-sealed.yaml
#
#   方案 C — External Secrets Operator (对接 AWS Secrets Manager / Vault):
#     kubectl apply -f base/external-secrets.yaml
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: shortdrama-secrets
  namespace: shortdrama
type: Opaque
stringData:
  # 数据库
  DB_USER: "admin"
  DB_PASSWORD: "<CHANGE-ME>"
  DB_ROOT_PASSWORD: "<CHANGE-ME>"

  # Redis
  REDIS_PASSWORD: "<CHANGE-ME>"

  # RabbitMQ
  RABBITMQ_USER: "admin"
  RABBITMQ_PASSWORD: "<CHANGE-ME>"

  # MinIO / S3
  MINIO_ROOT_USER: "minioadmin"
  MINIO_ROOT_PASSWORD: "<CHANGE-ME>"
  STORAGE_ACCESS_KEY: "<CHANGE-ME>"
  STORAGE_SECRET_KEY: "<CHANGE-ME>"

  # AI 模型 API Keys
  DEEPSEEK_API_KEY: "<YOUR-DEEPSEEK-API-KEY>"
  SEEDANCE_API_KEY: "<YOUR-SEEDANCE-API-KEY>"

  # JWT + 应用安全
  JWT_SECRET_KEY: "<RANDOM-64-CHAR-STRING>"
  SECRET_KEY: "<RANDOM-64-CHAR-STRING>"
