# Linkerd Service Profiles — per-service retry budgets, timeouts, traffic policies
# Applied after: linkerd install | kubectl apply -f -
# These profiles enable: automatic retries, circuit breaking, request-level timeouts
---
apiVersion: linkerd.io/v1alpha2
kind: ServiceProfile
metadata:
  name: user-service.shortdrama.svc.cluster.local
  namespace: shortdrama
spec:
  routes:
    - name: "POST /api/v1/users"
      isRetryable: false
      timeout: 5s
    - name: "GET /api/v1/users/:id"
      isRetryable: true
      timeout: 2s
    - name: "POST /api/v1/auth/login"
      isRetryable: false
      timeout: 5s
    - name: "POST /api/v1/auth/verify"
      isRetryable: true
      timeout: 1s
---
apiVersion: linkerd.io/v1alpha2
kind: ServiceProfile
metadata:
  name: script-service.shortdrama.svc.cluster.local
  namespace: shortdrama
spec:
  routes:
    - name: "POST /api/v1/scripts/generate"
      isRetryable: false
      timeout: 120s       # AI generation is slow
    - name: "GET /api/v1/scripts/:id"
      isRetryable: true
      timeout: 5s
    - name: "POST /api/v1/scripts/novel2script"
      isRetryable: false
      timeout: 180s
---
apiVersion: linkerd.io/v1alpha2
kind: ServiceProfile
metadata:
  name: storyboard-service.shortdrama.svc.cluster.local
  namespace: shortdrama
spec:
  routes:
    - name: "POST /api/v1/storyboard/generate"
      isRetryable: false
      timeout: 120s
    - name: "GET /api/v1/storyboard/:taskId"
      isRetryable: true
      timeout: 5s
---
apiVersion: linkerd.io/v1alpha2
kind: ServiceProfile
metadata:
  name: llmhua-service.shortdrama.svc.cluster.local
  namespace: shortdrama
spec:
  routes:
    - name: "POST /api/v1/llmhua/images/generate"
      isRetryable: false
      timeout: 300s       # Image generation — longest timeout
    - name: "POST /api/v1/llmhua/videos/generate"
      isRetryable: false
      timeout: 600s       # Video generation — very long
    - name: "GET /api/v1/llmhua/:any/:taskId/status"
      isRetryable: true
      timeout: 5s
    - name: "POST /api/v1/llmhua/shots-to-video"
      isRetryable: false
      timeout: 900s       # Batch shots-to-video — longest
---
apiVersion: linkerd.io/v1alpha2
kind: ServiceProfile
metadata:
  name: video-service.shortdrama.svc.cluster.local
  namespace: shortdrama
spec:
  routes:
    - name: "POST /api/v1/videos/process"
      isRetryable: false
      timeout: 300s
    - name: "GET /api/v1/videos/:taskId"
      isRetryable: true
      timeout: 5s
---
apiVersion: linkerd.io/v1alpha2
kind: ServiceProfile
metadata:
  name: final-cut-service.shortdrama.svc.cluster.local
  namespace: shortdrama
spec:
  routes:
    - name: "POST /api/v1/final-cut/submit"
      isRetryable: false
      timeout: 300s
    - name: "GET /api/v1/final-cut/:taskId"
      isRetryable: true
      timeout: 5s
---
apiVersion: linkerd.io/v1alpha2
kind: ServiceProfile
metadata:
  name: content-service.shortdrama.svc.cluster.local
  namespace: shortdrama
spec:
  routes:
    - name: "GET /api/v1/cases"
      isRetryable: true
      timeout: 5s
    - name: "POST /api/v1/cases"
      isRetryable: false
      timeout: 10s
    - name: "GET /api/v1/works"
      isRetryable: true
      timeout: 5s
