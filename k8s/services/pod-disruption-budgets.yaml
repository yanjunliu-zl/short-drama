# Pod Disruption Budgets — ensure minimum availability during voluntary disruptions
# (node drains, rolling updates, etc.)
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: user-service-pdb
  namespace: shortdrama
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: user-service
---
