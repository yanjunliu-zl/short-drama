apiVersion: v1
kind: Service
metadata:
  name: video-service
  namespace: shortdrama
spec:
  ports:
    - port: 8000
  selector:
    app: video-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: video-service
  namespace: shortdrama
spec:
  replicas: 1
  selector:
    matchLabels:
      app: video-service
  template:
    metadata:
      labels:
        app: video-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
    spec:
      containers:
        - name: video-service
          image: shortdrama/video-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: shortdrama-config
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: shortdrama-secrets
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: shortdrama-secrets
                  key: DB_PASSWORD
            - name: RABBITMQ_USER
              valueFrom:
                secretKeyRef:
                  name: shortdrama-secrets
                  key: RABBITMQ_USER
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: shortdrama-secrets
                  key: RABBITMQ_PASSWORD
            - name: CELERY_BROKER_URL
              value: "amqp://$(RABBITMQ_USER):$(RABBITMQ_PASSWORD)@rabbitmq:5672//"
            - name: CELERY_RESULT_BACKEND
              value: "redis://redis:6379/0"
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: video-worker
  namespace: shortdrama
spec:
  replicas: 2
  selector:
    matchLabels:
      app: video-worker
  template:
    metadata:
      labels:
        app: video-worker
    spec:
      containers:
        - name: video-worker
          image: shortdrama/video-worker:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: CELERY_BROKER_URL
              value: "amqp://admin:admin123@rabbitmq:5672//"
            - name: CELERY_RESULT_BACKEND
              value: "redis://redis:6379/0"
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
