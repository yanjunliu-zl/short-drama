# MinIO 4-node distributed mode with erasure coding
# MinIO requires >= 4 nodes for erasure coding in distributed mode
# Each pod gets its own PVC; total usable = sum(pvc) / 2 (with default EC parity)
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: shortdrama
  labels:
    app: minio
spec:
  clusterIP: None  # Headless for StatefulSet
  ports:
    - port: 9000
      name: api
    - port: 9001
      name: console
  selector:
    app: minio
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: minio
  namespace: shortdrama
spec:
  serviceName: minio
  replicas: 4  # Minimum 4 for erasure coding
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: minio
          image: minio/minio:latest
          args:
            - server
            - --console-address
            - ":9001"
            # Distributed mode: each pod's /data is a separate erasure set
            - http://minio-{0...3}.minio.shortdrama.svc.cluster.local/data
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: shortdrama-secrets
                  key: MINIO_ROOT_USER
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: shortdrama-secrets
                  key: MINIO_ROOT_PASSWORD
          ports:
            - containerPort: 9000
              name: api
            - containerPort: 9001
              name: console
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: 9000
            initialDelaySeconds: 15
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 100Gi  # 4 × 100Gi / 2 (EC parity) = 200Gi usable
