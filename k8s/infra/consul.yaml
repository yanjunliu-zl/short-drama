# Consul 3-node cluster for service discovery
# Provides: health checking, service registration, KV store, DNS
apiVersion: v1
kind: Service
metadata:
  name: consul
  namespace: shortdrama
  labels:
    app: consul
spec:
  clusterIP: None  # Headless service for StatefulSet
  ports:
    - name: http
      port: 8500
      targetPort: 8500
    - name: dns
      port: 8600
      targetPort: 8600
      protocol: UDP
    - name: serf-lan
      port: 8301
      targetPort: 8301
      protocol: UDP
    - name: serf-wan
      port: 8302
      targetPort: 8302
      protocol: UDP
    - name: server
      port: 8300
      targetPort: 8300
  selector:
    app: consul
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: consul
  namespace: shortdrama
  labels:
    app: consul
spec:
  serviceName: consul
  replicas: 3
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app: consul
  template:
    metadata:
      labels:
        app: consul
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: consul
          image: hashicorp/consul:1.20
          command:
            - consul
          args:
            - agent
            - -server
            - -bootstrap-expect=3
            - -ui
            - -client=0.0.0.0
            - -datacenter=dc1
            - -retry-join=consul-0.consul.shortdrama.svc.cluster.local
            - -retry-join=consul-1.consul.shortdrama.svc.cluster.local
            - -retry-join=consul-2.consul.shortdrama.svc.cluster.local
            - -advertise=$(POD_IP)
            - -bind=0.0.0.0
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          ports:
            - containerPort: 8500
              name: http
            - containerPort: 8600
              name: dns
              protocol: UDP
            - containerPort: 8301
              name: serf-lan
              protocol: UDP
            - containerPort: 8302
              name: serf-wan
              protocol: UDP
            - containerPort: 8300
              name: server
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /v1/status/leader
              port: 8500
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /v1/status/peers
              port: 8500
            initialDelaySeconds: 10
            periodSeconds: 5
          volumeMounts:
            - name: consul-data
              mountPath: /consul/data
  volumeClaimTemplates:
    - metadata:
        name: consul-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
