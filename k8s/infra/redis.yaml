apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: shortdrama
  labels:
    app: redis
spec:
  clusterIP: None  # Headless for StatefulSet
  ports:
    - port: 6379
      name: redis
  selector:
    app: redis
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: shortdrama
spec:
  serviceName: redis
  replicas: 3  # Foundation for Redis Cluster (P1) / Sentinel
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: redis
          image: redis:7-alpine
          command:
            - redis-server
          args:
            - /usr/local/etc/redis/redis.conf
          ports:
            - containerPort: 6379
              name: redis
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /data
            - name: redis-config
              mountPath: /usr/local/etc/redis
      volumes:
        - name: redis-config
          configMap:
            name: redis-config
            items:
              - key: redis.conf
                path: redis.conf
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
---
# Redis config — foundation for P1 cluster mode
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
  namespace: shortdrama
data:
  redis.conf: |
    # P0: Standalone mode (foundation for P1 Redis Cluster)
    bind 0.0.0.0
    port 6379
    appendonly yes
    appendfsync everysec
    dir /data
    # P1: Uncomment for Redis Cluster
    # cluster-enabled yes
    # cluster-config-file /data/nodes.conf
    # cluster-node-timeout 5000
    save 900 1
    save 300 10
    save 60 10000
