# TorchRec Distributed Training — K8s PyTorchJob
# Requires: kubectl apply -f https://github.com/kubeflow/training-operator/releases/latest/download/manifests.yaml
#
# Usage:
#   kubectl apply -f k8s/spark/torchrec-training-job.yaml
#   kubectl logs -n shortdrama torchrec-train-master-0 -f
---
apiVersion: "kubeflow.org/v1"
kind: PyTorchJob
metadata:
  name: torchrec-train
  namespace: shortdrama
spec:
  pytorchReplicaSpecs:
    Master:
      replicas: 1
      restartPolicy: OnFailure
      template:
        metadata:
          labels:
            app: torchrec-train
        spec:
          priorityClassName: medium-priority
          containers:
            - name: pytorch
              image: ghcr.io/yanjunliu-zl/short-drama/recommendation-service:latest
              command:
                - torchrun
                - --nproc_per_node=1
                - --master_addr=localhost
                - -m
                - app.services.training.torchrec_job
                - --limit=5000000
              env:
                - name: WORLD_SIZE
                  value: "1"
                - name: RANK
                  value: "0"
                - name: CLICKHOUSE_HOST
                  value: clickhouse
                - name: MODEL_DIR
                  value: /app/data/models
              resources:
                requests: { cpu: "4", memory: "16Gi", "nvidia.com/gpu": "1" }
                limits: { cpu: "8", memory: "32Gi", "nvidia.com/gpu": "1" }
              volumeMounts:
                - name: models
                  mountPath: /app/data/models
          volumes:
            - name: models
              persistentVolumeClaim:
                claimName: model-storage
    Worker:
      replicas: 3  # 3 GPUs for data parallel
      restartPolicy: OnFailure
      template:
        metadata:
          labels:
            app: torchrec-train
        spec:
          containers:
            - name: pytorch
              image: ghcr.io/yanjunliu-zl/short-drama/recommendation-service:latest
              command:
                - torchrun
                - --nproc_per_node=1
                - --master_addr=torchrec-train-master-0
                - -m
                - app.services.training.torchrec_job
              resources:
                requests: { cpu: "4", memory: "16Gi", "nvidia.com/gpu": "1" }
                limits: { cpu: "8", memory: "32Gi", "nvidia.com/gpu": "1" }
              volumeMounts:
                - name: models
                  mountPath: /app/data/models
          volumes:
            - name: models
              persistentVolumeClaim:
                claimName: model-storage
---
# Model Storage PVC
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: model-storage
  namespace: shortdrama
spec:
  accessModes: ["ReadWriteMany"]
  resources:
    requests:
      storage: 50Gi
