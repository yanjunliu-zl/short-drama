name: CI — Build, Test, Push

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  # ── Python Services ──
  python-services:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [script-service, storyboard-service, llmhua-service, recommendation-service, scene-extractor]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: backend/services/${{ matrix.service }}
          push: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Go Services ──
  go-services:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [user-service, content-service, final-cut-service]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: false

      - name: Build Go binary
        working-directory: backend/services/${{ matrix.service }}
        run: CGO_ENABLED=0 GOOS=linux go build -o ${{ matrix.service }} ./cmd

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: backend/services/${{ matrix.service }}
          file: backend/services/${{ matrix.service }}/Dockerfile.prebuilt
          push: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Frontend ──
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install & Build
        working-directory: frontend
        run: npm ci && npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: frontend
          push: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/frontend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Kustomize Update (GitOps) ──
  update-manifests:
    needs: [python-services, go-services, frontend]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update image tags in Kustomize
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          cd k8s/overlays/us-east-1
          kustomize edit set image \
            "shortdrama/script-service=ghcr.io/${{ env.IMAGE_PREFIX }}/script-service:${SHORT_SHA}" \
            "shortdrama/storyboard-service=ghcr.io/${{ env.IMAGE_PREFIX }}/storyboard-service:${SHORT_SHA}" \
            "shortdrama/llmhua-service=ghcr.io/${{ env.IMAGE_PREFIX }}/llmhua-service:${SHORT_SHA}" \
            "shortdrama/recommendation-service=ghcr.io/${{ env.IMAGE_PREFIX }}/recommendation-service:${SHORT_SHA}" \
            "shortdrama/user-service=ghcr.io/${{ env.IMAGE_PREFIX }}/user-service:${SHORT_SHA}" \
            "shortdrama/content-service=ghcr.io/${{ env.IMAGE_PREFIX }}/content-service:${SHORT_SHA}" \
            "shortdrama/final-cut-service=ghcr.io/${{ env.IMAGE_PREFIX }}/final-cut-service:${SHORT_SHA}" \
            "shortdrama/frontend=ghcr.io/${{ env.IMAGE_PREFIX }}/frontend:${SHORT_SHA}"

      - name: Commit updated manifests
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add k8s/overlays/
          git diff --staged --quiet || git commit -m "ci: update image tags to ${{ github.sha }}"
          git push
