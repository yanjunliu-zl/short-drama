name: CI — Build, Test, Push

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  # ── Python Services ──
  python-services:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [script-service, storyboard-service, llmhua-service]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Build ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: backend/services/${{ matrix.service }}
          push: false
          load: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Go Services ──
  go-services:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [user-service, content-service, final-cut-service, recommendation-service, search-service]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: false

      - name: Build Go binary
        working-directory: ${{ contains(fromJSON('["recommendation-service","search-service"]'), matrix.service) && matrix.service || format('backend/services/{0}', matrix.service) }}
        run: CGO_ENABLED=0 GOOS=linux go build -o ${{ matrix.service }} ./cmd

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Build ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ contains(fromJSON('["recommendation-service","search-service"]'), matrix.service) && matrix.service || format('backend/services/{0}', matrix.service) }}
          file: ${{ contains(fromJSON('["recommendation-service","search-service"]'), matrix.service) && format('{0}/Dockerfile', matrix.service) || format('backend/services/{0}/Dockerfile.prebuilt', matrix.service) }}
          push: false
          load: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Frontend ──
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install & Build
        working-directory: frontend
        run: npm ci && npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Build frontend
        uses: docker/build-push-action@v5
        with:
          context: frontend
          push: false
          load: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/frontend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Kustomize Manifest Check (GitOps readiness) ──
  check-manifests:
    needs: [python-services, go-services, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Validate Kustomize overlays
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "## GitOps Manifest Check" >> $GITHUB_STEP_SUMMARY
          echo "Image tag would be: ${SHORT_SHA}" >> $GITHUB_STEP_SUMMARY
          echo "Target regions: us-east-1, ap-southeast-1, eu-west-1" >> $GITHUB_STEP_SUMMARY
          echo "To deploy: kubectl apply -k k8s/overlays/<region>" >> $GITHUB_STEP_SUMMARY
