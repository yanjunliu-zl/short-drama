# Redis配置文件

# 基本设置
bind 0.0.0.0
port 6379
protected-mode no
daemonize no

# 持久化
save 900 1
save 300 10
save 60 10000
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# 内存管理
maxmemory 256mb
maxmemory-policy allkeys-lru

# 日志
loglevel notice
logfile ""

# 慢日志
slowlog-log-slower-than 10000
slowlog-max-len 128

# 客户端
maxclients 10000
timeout 0

# 复制
replica-serve-stale-data yes
replica-read-only yes

# 安全
requirepass ""

# AOF
appendonly no
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# 集群
cluster-enabled no