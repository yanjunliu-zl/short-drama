# Traefik 中间件配置

http:
  middlewares:
    # 压缩中间件
    compress:
      compress: {}

    # P3: Tiered rate limiting for billion-level concurrency
    # Global default (generous for public content)
    rate-limit:
      rateLimit:
        average: 1000
        burst: 200

    # Auth endpoints — tight to prevent brute force
    rate-limit-auth:
      rateLimit:
        average: 10
        burst: 5

    # AI generation endpoints — expensive, very tight
    rate-limit-ai:
      rateLimit:
        average: 5
        burst: 2

    # Public content browsing — generous
    rate-limit-public:
      rateLimit:
        average: 500
        burst: 100

    # Video processing — moderate
    rate-limit-video:
      rateLimit:
        average: 20
        burst: 10

    # 认证中间件
    auth:
      basicAuth:
        users:
          - "admin:$apr1$6lJ9lL5q$0.8G8XJc8Q9p0.5k.5.5k."

    # JWT 认证中间件 - 使用 ForwardAuth
    jwt-auth:
      forwardAuth:
        address: "http://user-service:8080/api/v1/auth/verify"
        trustForwardHeader: true
        authResponseHeaders:
          - X-User-ID
          - X-User-Role

    # 跨域中间件
    cors:
      headers:
        accessControlAllowCredentials: true
        accessControlAllowHeaders:
          - "*"
        accessControlAllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
          - PATCH
        accessControlAllowOriginList:
          - "http://localhost:3000"
          - "http://localhost:8080"
          - "https://shortdrama.com"
        accessControlMaxAge: 100
        addVaryHeader: true

    # 安全头中间件（本地开发已禁用 SSL 相关头）
    security-headers:
      headers:
        browserXssFilter: true
        contentTypeNosniff: true
        frameDeny: false
        sslRedirect: false

    # 重试中间件
    retry:
      retry:
        attempts: 3
        initialInterval: 500ms

    # 断路器中间件
    circuit-breaker:
      circuitBreaker:
        expression: "NetworkErrorRatio() > 0.5"

    # 超时配置已移至 entrypoint 层级 (Traefik v3 不支持 headers 方式)

    # 请求日志中间件
    request-log:
      plugin:
        traefik-plugin-request-log:
          format: "common"
