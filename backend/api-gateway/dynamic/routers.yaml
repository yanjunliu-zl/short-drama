# Traefik 路由配置

http:
  routers:
    # 用户服务路由
    user-service:
      rule: "PathPrefix(`/api/v1/users`)"
      entryPoints:
        - web
      middlewares:
        - cors
        - rate-limit
        - security-headers
        - retry
      service: user-service
    # 剧本服务路由
    script-service:
      rule: "PathPrefix(`/api/v1/scripts`)"
      entryPoints:
        - web
      middlewares:
        - cors
        - rate-limit
        - security-headers
        - retry
      service: script-service
    # 视频服务路由
    video-service:
      rule: "PathPrefix(`/api/v1/videos`)"
      entryPoints:
        - web
      middlewares:
        - cors
        - rate-limit
        - security-headers
        - retry
      service: video-service

    # 最终剪辑服务路由
    final-cut-service:
      rule: "PathPrefix(`/api/v1/final-cut`)"
      entryPoints:
        - web
      middlewares:
        - cors
        - rate-limit
        - security-headers
        - retry
      service: final-cut-service

    # 内容服务路由 (案例广场 + 我的作品)
    content-service:
      rule: "PathPrefix(`/api/v1/cases`) || PathPrefix(`/api/v1/works`) || PathPrefix(`/api/v1/scenes`) || PathPrefix(`/api/v1/characters`) || PathPrefix(`/api/v1/assets`) || PathPrefix(`/api/v1/payments`)"
      entryPoints:
        - web
      middlewares:
        - cors
        - rate-limit
        - security-headers
        - retry
      service: content-service

    # 分镜服务路由
    storyboard-service:
      rule: "PathPrefix(`/api/v1/storyboard`)"
      entryPoints:
        - web
      middlewares:
        - cors
        - rate-limit
        - security-headers
        - retry
      service: storyboard-service

    # llmhua AI图像视频生成服务路由
    llmhua-service:
      rule: "PathPrefix(`/api/v1/llmhua`)"
      entryPoints:
        - web
      middlewares:
        - cors
        - rate-limit
        - security-headers
        - retry
      service: llmhua-service

    # Traefik仪表板路由
    traefik-dashboard:
      rule: "Host(`traefik.localhost`)"
      entryPoints:
        - web
      middlewares:
        - auth
      service: api@internal

  services:
    # 用户服务
    user-service:
      loadBalancer:
        servers:
          - url: "http://user-service:8080"
        healthCheck:
          path: /health
          interval: 30s
          timeout: 5s

    # 剧本服务
    script-service:
      loadBalancer:
        servers:
          - url: "http://script-service:8000"
        healthCheck:
          path: /health
          interval: 30s
          timeout: 5s

    # 视频服务
    video-service:
      loadBalancer:
        servers:
          - url: "http://video-service:8000"
        healthCheck:
          path: /health
          interval: 30s
          timeout: 5s

    # 最终剪辑服务
    final-cut-service:
      loadBalancer:
        servers:
          - url: "http://final-cut-service:8085"
        healthCheck:
          path: /health
          interval: 30s
          timeout: 5s

    # 内容服务 (案例广场 + 我的作品)
    content-service:
      loadBalancer:
        servers:
          - url: "http://content-service:8081"
        healthCheck:
          path: /health
          interval: 30s
          timeout: 5s

    # 分镜服务
    storyboard-service:
      loadBalancer:
        servers:
          - url: "http://storyboard-service:8001"
        healthCheck:
          path: /health
          interval: 30s
          timeout: 5s

    # llmhua AI图像视频生成服务
    llmhua-service:
      loadBalancer:
        servers:
          - url: "http://llmhua-service:8002"
        healthCheck:
          path: /health
          interval: 30s
          timeout: 5s