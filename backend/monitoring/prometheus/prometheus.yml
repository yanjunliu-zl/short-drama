global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alerts/*.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

scrape_configs:
  # Prometheus 自身
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # 主机监控 — Node Exporter
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']

  # 容器监控 — cAdvisor
  - job_name: 'docker'
    static_configs:
      - targets: ['cadvisor:8080']

  # Redis
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']

  # MySQL
  - job_name: 'mysql'
    static_configs:
      - targets: ['mysqld-exporter:9104']

  # RabbitMQ (内置 Prometheus 插件端口 15692)
  - job_name: 'rabbitmq'
    static_configs:
      - targets: ['rabbitmq:15692']

  # Traefik 网关
  - job_name: 'traefik'
    static_configs:
      - targets: ['traefik:8080']

  # ========= 应用服务 =========

  # 用户服务 (GoZero)
  - job_name: 'user-service'
    static_configs:
      - targets: ['user-service:9080']

  # 内容服务 (GoZero)
  - job_name: 'content-service'
    static_configs:
      - targets: ['content-service:9081']

  # 剧本服务 (FastAPI)
  - job_name: 'script-service'
    static_configs:
      - targets: ['script-service:8000']
    metrics_path: '/metrics'
    scrape_interval: 30s

  # 分镜服务 (FastAPI)
  - job_name: 'storyboard-service'
    static_configs:
      - targets: ['storyboard-service:8001']
    metrics_path: '/metrics'
    scrape_interval: 30s

  # LLM 服务 (FastAPI)
  - job_name: 'llmhua-service'
    static_configs:
      - targets: ['llmhua-service:8002']
    metrics_path: '/metrics'
    scrape_interval: 30s

  # 场景提取服务 (FastAPI)
  - job_name: 'scene-extractor'
    static_configs:
      - targets: ['scene-extractor:8003']
    metrics_path: '/metrics'
    scrape_interval: 30s

  # 视频服务 (FastAPI)
  - job_name: 'video-service'
    static_configs:
      - targets: ['video-service:8000']
    metrics_path: '/metrics'
    scrape_interval: 30s

  # 最终剪辑服务 (GoZero)
  - job_name: 'final-cut-service'
    static_configs:
      - targets: ['final-cut-service:9085']
