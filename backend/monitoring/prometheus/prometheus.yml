global:
  scrape_interval: 15s
  evaluation_interval: 15s

# 告警规则
rule_files:
  - "alerts/*.yml"

# 告警管理器配置
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

# 抓取配置
scrape_configs:
  # Prometheus自身指标
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Traefik指标
  - job_name: 'traefik'
    static_configs:
      - targets: ['traefik:8080']

  # 用户服务指标 (GoZero)
  - job_name: 'user-service'
    static_configs:
      - targets: ['user-service:9080']
    metrics_path: '/metrics'

  # 剧本服务指标 (FastAPI)
  - job_name: 'script-service'
    static_configs:
      - targets: ['script-service:8000']
    metrics_path: '/metrics'
    scrape_interval: 30s

  # 视频服务指标
  - job_name: 'video-service'
    static_configs:
      - targets: ['video-service:8000']
    metrics_path: '/metrics'

  # Node Exporter (如果需要监控主机)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # cAdvisor (容器监控)
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  # Redis指标
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']

  # MySQL指标
  - job_name: 'mysql'
    static_configs:
      - targets: ['mysqld-exporter:9104']

  # RabbitMQ指标
  - job_name: 'rabbitmq'
    static_configs:
      - targets: ['rabbitmq-exporter:9419']