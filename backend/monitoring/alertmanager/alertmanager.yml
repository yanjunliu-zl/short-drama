#         send_resolved: true
#
# 飞书机器人:
#   - name: 'feishu'
#     webhook_configs:
#       - url: 'https://open.feishu.cn/open-apis/bot/v2/hook/YOUR_HOOK'
#         send_resolved: true
#
# 企业微信:
