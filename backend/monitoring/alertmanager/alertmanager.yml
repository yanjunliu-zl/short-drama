global:
  resolve_timeout: 5m

# ── Routing ──
route:
  receiver: 'default'
  group_by: ['alertname', 'service']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  routes:
    - match:
        severity: critical
      receiver: 'critical'
      repeat_interval: 15m

# ── Receivers ──
receivers:
  - name: 'default'
    # 日志输出 (开发环境用，生产环境替换为钉钉/飞书/邮件/PagerDuty)
    webhook_configs: []

  - name: 'critical'
    webhook_configs: []

