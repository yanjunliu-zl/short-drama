Name: final-cut-service
Host: 0.0.0.0
Port: 8085

# 日志配置
Log:
  Level: info
  Mode: console
  Encoding: json
  StackTrace: false
  DisableCaller: false

# Prometheus 指标
DevServer:
  Port: 9085
  EnableMetrics: true

# 数据库配置 - 支持集群部署的连接池优化
Database:
  Host: mysql
  Port: 3306
  User: admin
  Password: admin123
  DBName: shortdrama
  MaxOpenConns: 20   # Per-pod: 10 pods × 20 = 200 total
  MaxIdleConns: 10
  ConnMaxLifetime: 3600
  MaxLifetime: 7200
  # P1: MySQL read replica hosts (uncomment when mysql-read service is deployed)
  # ReadHosts:
  #   - mysql-read-0.mysql-read
  #   - mysql-read-1.mysql-read
  #   - mysql-read-2.mysql-read

# Redis配置 - 支持单机和集群模式
Redis:
  Host: redis
  Port: 6379
  Password: ""
  DB: 5
  PoolSize: 50    # Per-pod: 10 pods × 50 = 500
  MinIdleConns: 5
  ClusterEnabled: false
  ClusterNodes:
    - redis-node1:6379
    - redis-node2:6379
    - redis-node3:6379

# Redis集群配置（当ClusterEnabled为true时使用）
RedisCluster:
  Enabled: false
  Nodes:
    - redis-node1:6379
    - redis-node2:6379
    - redis-node3:6379
  Password: ""
  PoolSize: 200
  MinIdleConns: 20

# RabbitMQ配置 - 支持集群部署
RabbitMQ:
  Host: rabbitmq
  Port: 5672
  User: admin
  Password: admin123
  VHost: /
  Heartbeat: 30
  ChannelMax: 65535

# 服务发现 - Consul用于集群服务注册与发现
Consul:
  Host: consul
  Port: 8500
  Token: ""
  Enabled: true
  Datacenter: dc1

# 限流配置
RateLimit:
  Rate: 100
  Burst: 50

# 熔断器配置
CircuitBreaker:
  Window: 10s
  Bucket: 100
  ErrorRate: 0.5

# 重试配置
RetryConfig:
  MaxRetries: 3
  InitialDelay: 500ms
  MaxDelay: 5s
  BackoffFactor: 2.0

# 健康检查
HealthCheck:
  Interval: 30s
  Timeout: 5s

# AI服务配置
AIService:
  Endpoint: http://llmhua-service:8000
  Timeout: 60

# 剧本服务配置
ScriptService:
  Endpoint: http://script-service:8000
  Timeout: 30

# 视频服务配置
VideoService:
  Endpoint: http://video-service:8081
  Timeout: 30

# 存储配置 (MinIO / Ceph / S3 兼容)
Storage:
  Type: minio
  Endpoint: minio:9000
  AccessKey: minioadmin
  SecretKey: minioadmin
  Bucket: short-drama
  Region: us-east-1
  UseSSL: false
