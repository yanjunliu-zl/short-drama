Name: user-service
Host: 0.0.0.0
Port: 8080

# 日志配置
Log:
  Level: info
  Mode: console
  Encoding: json
  StackTrace: false
  DisableCaller: false

# Prometheus 指标
DevServer:
  Port: 9080
  EnableMetrics: true

# 数据库配置
Database:
  Host: mysql
  Port: 3306
  User: admin
  Password: admin123
  DBName: shortdrama
  MaxOpenConns: 20
  MaxIdleConns: 10
  ConnMaxLifetime: 3600

# Redis配置
Redis:
  Host: redis
  Port: 6379
  Password: ""
  DB: 0
  PoolSize: 50
  MinIdleConns: 5

# RabbitMQ配置
RabbitMQ:
  Host: rabbitmq
  Port: 5672
  User: admin
  Password: admin123
  VHost: /

# 服务发现
Consul:
  Host: consul
  Port: 8500
  Token: ""
  Enabled: true
  Datacenter: dc1

# JWT配置
JWT:
  Secret: your-jwt-secret-key-here-change-in-production
  Expire: 86400 # 24小时

# 限流配置
RateLimit:
  Rate: 100
  Burst: 50

# 熔断器配置
CircuitBreaker:
  Window: 10s
  Bucket: 100
  ErrorRate: 0.5

# 健康检查
HealthCheck:
  Interval: 30s
  Timeout: 5s