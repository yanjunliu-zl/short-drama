Name: payment-service
Host: 0.0.0.0
Port: 8086

Database:
  Host: localhost
  Port: 3306
  User: root
  Password: ""
  DBName: short_drama_payment
  MaxOpenConns: 100
  MaxIdleConns: 10
  ConnMaxLifetime: 3600

Redis:
  Host: localhost
  Port: 6379
  Password: ""
  DB: 0
  PoolSize: 50
  MinIdleConns: 5

WeChatPay:
  AppID: "your_wechat_app_id"
  MchID: "your_merchant_id"
  APIv3Key: "your_api_v3_key"
  PrivateKeyPath: "/path/to/wechat/apiclient_key.pem"
  SerialNo: "your_certificate_serial_no"
  NotifyURL: "https://yourdomain.com/api/v1/payments/wechat/notify"
  ReturnURL: "https://yourdomain.com/payment/result"

Alipay:
  AppID: "your_alipay_app_id"
  PrivateKey: "your_app_private_key"
  AlipayPublicKey: "alipay_public_key"
  NotifyURL: "https://yourdomain.com/api/v1/payments/alipay/notify"
  ReturnURL: "https://yourdomain.com/payment/result"
  SignType: "RSA2"

JWT:
  Secret: "your_jwt_secret"
  Expire: 86400
